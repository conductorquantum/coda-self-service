repos:
  - repo: local
    hooks:
      - id: ruff-format-check
        name: Ruff format check
        entry: uv run ruff format --check .
        language: system
        pass_filenames: false
      - id: ruff-lint
        name: Ruff lint
        entry: uv run ruff check .
        language: system
        pass_filenames: false
      - id: update-docs
        name: Update docs
        entry: bash -c 'claude -p --dangerously-skip-permissions --allowedTools "Read,Edit,Write,Bash,Glob,Grep" --append-system-prompt-file .agents/skills/update-docs/SKILL.md "Review the staged diff and update any docs that are out of date. If nothing needs updating, do nothing." && git add docs/ README.md 2>/dev/null || true'
        language: system
        pass_filenames: false
        stages: [pre-commit]
